<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Freelance teacher quota dashboard demo</title>
  <desc id="desc">Sanitized vector preview with dummy project quota, progress, and fee data.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#edf4ff"/><stop offset="1" stop-color="#f5f8fc"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#345" flood-opacity=".10"/></filter></defs>
  <style>text{font-family:Inter,Arial,sans-serif;fill:#172033}.muted{fill:#667797}.label{font-size:14px;font-weight:800;letter-spacing:1px}.num{font-size:31px;font-weight:800}.card{fill:#fff;stroke:#dbe4f0}.small{font-size:14px}.body{font-size:17px}.bold{font-weight:700}.demo{font-size:14px;font-weight:800;letter-spacing:2px;fill:#2463eb}</style>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="72" fill="#fff"/><path d="M0 72h1600" stroke="#dce5f0"/>
