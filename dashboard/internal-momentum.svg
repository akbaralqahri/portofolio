<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Selection momentum calendar dashboard demo</title>
  <desc id="desc">Sanitized vector preview with dummy registration, test, announcement, and timeline data.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#e9fbf8"/><stop offset=".45" stop-color="#f3f5fb"/><stop offset="1" stop-color="#e6f8fb"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#345" flood-opacity=".12"/></filter></defs>
  <style>text{font-family:Inter,Arial,sans-serif;fill:#172033}.muted{fill:#66758c}.label{font-size:14px;font-weight:800;letter-spacing:1px}.num{font-size:34px;font-weight:800}.card{fill:#ffffffd9;stroke:#fff}.small{font-size:14px}.body{font-size:17px}.bold{font-weight:700}.demo{font-size:14px;font-weight:800;letter-spacing:2px;fill:#0a9c73}</style>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="74" fill="#fff" fill-opacity=".9"/><text x="80" y="34" font-size="25" font-weight="800">Dashboard Jadwal Momentum</text><text x="80" y="56" class="muted small">Pantau pendaftaran, tes, dan pengumuman dalam satu timeline.</text>
  <rect x="845" y="20" width="86" height="34" rx="17" fill="#12b886"/><text x="888" y="42" fill="#fff" class="small bold" text-anchor="middle">2026</text><rect x="941" y="20" width="82" height="34" rx="17" fill="#f1f3f8"/><text x="982" y="42" class="small bold" text-anchor="middle">2025</text><rect x="1033" y="20" width="92" height="34" rx="17" fill="#f1f3f8"/><text x="1079" y="42" class="small bold" text-anchor="middle">Demo</text>
  <rect x="1260" y="20" width="272" height="34" rx="17" fill="#e6faf4"/><text x="1396" y="42" class="demo" text-anchor="middle">SANITIZED DEMO DATA</text>
  <g transform="translate(80 98)"><g filter="url(#shadow)"><rect class="card" width="330" height="116" rx="18"/><text x="24" y="35" class="muted label">TOTAL EVENT</text><text x="24" y="80" class="num" fill="#10ae79">12</text><text x="24" y="103" class="muted small">agenda tahun berjalan</text></g><g transform="translate(350)" filter="url(#shadow)"><rect class="card" width="330" height="116" rx="18"/><text x="24" y="35" class="muted label">SEDANG BUKA</text><text x="24" y="80" class="num" fill="#10ae79">3</text><text x="24" y="103" class="muted small">pendaftaran aktif</text></g><g transform="translate(700)" filter="url(#shadow)"><rect class="card" width="330" height="116" rx="18"/><text x="24" y="35" class="muted label">TES BERLANGSUNG</text><text x="24" y="80" class="num" fill="#e68100">2</text><text x="24" y="103" class="muted small">momentum ujian</text></g><g transform="translate(1050)" filter="url(#shadow)"><rect class="card" width="330" height="116" rx="18"/><text x="24" y="35" class="muted label">AKAN DATANG</text><text x="24" y="80" class="num" fill="#2463eb">4</text><text x="24" y="103" class="muted small">belum dibuka</text></g></g>
  <g transform="translate(80 238)" filter="url(#shadow)"><rect class="card" width="650" height="270" rx="18"/><text x="24" y="42" font-size="20" font-weight="800">Distribusi Status</text><circle cx="325" cy="152" r="77" fill="none" stroke="#e9edf3" stroke-width="38"/><circle cx="325" cy="152" r="77" fill="none" stroke="#12b886" stroke-width="38" stroke-dasharray="135 484" transform="rotate(-90 325 152)"/><circle cx="325" cy="152" r="77" fill="none" stroke="#e98500" stroke-width="38" stroke-dasharray="95 484" stroke-dashoffset="-135" transform="rotate(-90 325 152)"/><circle cx="325" cy="152" r="77" fill="none" stroke="#6b4ce6" stroke-width="38" stroke-dasharray="72 484" stroke-dashoffset="-230" transform="rotate(-90 325 152)"/><circle cx="325" cy="152" r="77" fill="none" stroke="#ef3131" stroke-width="38" stroke-dasharray="182 484" stroke-dashoffset="-302" transform="rotate(-90 325 152)"/><text x="325" y="148" font-size="28" font-weight="800" text-anchor="middle">12</text><text x="325" y="171" class="muted small" text-anchor="middle">event demo</text></g>
  <g transform="translate(750 238)" filter="url(#shadow)"><rect class="card" width="710" height="270" rx="18"/><text x="24" y="42" font-size="20" font-weight="800">Event per Product Line</text><path d="M150 72v160M150 232h510" stroke="#dfe5ed"/><g class="small bold"><text x="24" y="95">Product A</text><text x="24" y="132">Product B</text><text x="24" y="169">Product C</text><text x="24" y="206">Product D</text></g><rect x="150" y="78" width="430" height="20" rx="8" fill="#a88722"/><rect x="150" y="115" width="310" height="20" rx="8" fill="#32834a"/><rect x="150" y="152" width="220" height="20" rx="8" fill="#3d70d8"/><rect x="150" y="189" width="140" height="20" rx="8" fill="#b34cc2"/><g class="small muted"><text x="150" y="252">0</text><text x="320" y="252">2</text><text x="490" y="252">4</text><text x="650" y="252">6</text></g></g>
  <g transform="translate(80 532)" filter="url(#shadow)"><rect class="card" width="1380" height="320" rx="18"/><text x="24" y="40" font-size="20" font-weight="800">Timeline Momentum 2026</text><text x="24" y="63" class="muted small">Pendaftaran, tes, dan pengumuman per bulan</text><g class="small muted" text-anchor="middle"><text x="300" y="98">Jan</text><text x="390" y="98">Feb</text><text x="480" y="98">Mar</text><text x="570" y="98">Apr</text><text x="660" y="98">Mei</text><text x="750" y="98">Jun</text><text x="840" y="98">Jul</text><text x="930" y="98">Agu</text><text x="1020" y="98">Sep</text><text x="1110" y="98">Okt</text><text x="1200" y="98">Nov</text><text x="1290" y="98">Des</text></g><g class="body bold"><text x="24" y="138">Program Alpha</text><text x="24" y="182">Program Beta</text><text x="24" y="226">Program Gamma</text><text x="24" y="270">Program Delta</text></g><g fill="#edf0f5"><rect x="260" y="119" width="1080" height="18" rx="9"/><rect x="260" y="163" width="1080" height="18" rx="9"/><rect x="260" y="207" width="1080" height="18" rx="9"/><rect x="260" y="251" width="1080" height="18" rx="9"/></g><rect x="430" y="119" width="190" height="18" rx="9" fill="#2dbf93"/><rect x="600" y="119" width="245" height="18" rx="9" fill="#e88a12"/><rect x="520" y="163" width="145" height="18" rx="9" fill="#2dbf93"/><rect x="665" y="163" width="95" height="18" rx="9" fill="#e88a12"/><rect x="760" y="207" width="220" height="18" rx="9" fill="#2dbf93"/><rect x="980" y="207" width="105" height="18" rx="9" fill="#e88a12"/><rect x="1020" y="251" width="180" height="18" rx="9" fill="#2dbf93"/><path d="M842 108v178" stroke="#ef3131" stroke-width="2"/><text x="850" y="302" class="small" fill="#ef3131">hari ini</text></g>
</svg>
