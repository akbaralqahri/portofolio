<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #070707;
            color: #eaeaea;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            text-align: center;
        }
        .wrap { padding: 2rem; }
        .code {
            font-family: 'Fira Code', monospace;
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 700;
            color: #d4af37;
            line-height: 1;
        }
        .msg { margin: 1rem 0 0.4rem; font-size: 1.25rem; }
        .sub { color: #9a9a9a; font-size: 0.95rem; }
        a {
            display: inline-block;
            margin-top: 1.8rem;
            padding: 0.7rem 1.6rem;
            border: 1px solid #d4af37;
            border-radius: 999px;
            color: #d4af37;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background 0.25s, color 0.25s;
        }
        a:hover { background: #d4af37; color: #070707; }
        .mono { font-family: 'Fira Code', monospace; color: #6f6f6f; margin-top: 2.2rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">404</div>
        <p class="msg">Page not found — halaman tidak ditemukan.</p>
        <p class="sub">The page you're looking for doesn't exist or has moved.</p>
        <a href="https://akbaralqahri.github.io/portofolio/">Back to portfolio</a>
        <p class="mono">~/404 $ cd home_</p>
    </div>
</body>
</html>
